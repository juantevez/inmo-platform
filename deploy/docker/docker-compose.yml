version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: inmo-postgres
    environment:
      POSTGRES_USER: inmo_user
      POSTGRES_PASSWORD: inmo_password
      POSTGRES_DB: inmo_catalog_db # Base por defecto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 🚀 Truco: Creamos la base de auth_db automáticamente al levantar por primera vez
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    networks:
      - inmo-network
    healthcheck:
      test: ["CMD-SHELL", "psql -U inmo_user -d inmo_catalog_db -c 'SELECT 1;' && psql -U inmo_user -d auth_db -c 'SELECT 1;'"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 25s

  # --- MESSAGE BROKER: NATS con JetStream ---
  nats:
    image: nats:2.10-alpine
    container_name: inmo-nats
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222" 
      - "8222:8222" 
    volumes:
      - nats_data:/data
    networks:
      - inmo-network
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "4222"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- CACHE & RATE LIMITS: Redis ---
  redis:
    image: redis:7-alpine
    container_name: inmo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - inmo-network

  # --- MIGRATIONS: Corredor Automático para Auth ---
  auth-db-migration:
    image: migrate/migrate
    container_name: inmo-auth-migration
    volumes:
      # Apunta relativo a la carpeta de migraciones dentro del contexto
      - ../../contexts/auth-identity/migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://inmo_user:inmo_password@postgres:5432/auth_db?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inmo-network

  # --- MICROSERVICE: Auth & Identity (Tu módulo en Go) ---
  auth-identity:
    build:
      context: ../../contexts/auth-identity
      dockerfile: Dockerfile
      network: host
    container_name: inmo-auth-identity
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=:8080
      - DATABASE_URL=postgres://inmo_user:inmo_password@postgres:5432/auth_db?sslmode=disable
      - REDIS_URL=redis:6379
      # El día que integres NATS real, la URL interna de conexión será nats://nats:4222
      - NATS_URL=nats://nats:4222 
      # 🚀 Inyección de secretos de SSO desde el archivo .env hacia Go:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - META_APP_ID=${META_APP_ID}
      - META_CLIENT_SECRET=${META_CLIENT_SECRET}      
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-db-migration:
        condition: service_completed_successfully # Espera a que las migraciones terminen bien
    networks:
      - inmo-network

  catalog:
    build:
      context: ../../
      dockerfile: contexts/catalog/Dockerfile
      network: host
    container_name: inmo-catalog
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://inmo_user:inmo_password@inmo-postgres:5432/inmo_catalog_db?sslmode=disable
      - NATS_URL=nats://inmo-nats:4222 
      - DB_HOST=inmo-postgres
      - DB_PORT=5432
      - DB_USER=inmo_user
      - DB_PASSWORD=inmo_password
      - DB_NAME=inmo_catalog_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inmo-network

  crm:
    build:
      context: ../../
      dockerfile: contexts/crm/Dockerfile
      network: host
    container_name: inmo-crm
    ports:
      - "8084:8084"
    environment:
      - DATABASE_URL=postgres://inmo_user:inmo_password@inmo-postgres:5432/inmo_catalog_db?sslmode=disable
      - NATS_URL=nats://inmo-nats:4222 
      - DB_HOST=inmo-postgres
      - DB_PORT=5432
      - DB_USER=inmo_user
      - DB_PASSWORD=inmo_password
      - DB_NAME=inmo_catalog_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inmo-network

  contracts:
    build:
      context: ../../
      dockerfile: contexts/contracts/Dockerfile
      network: host
    container_name: inmo-contracts
    ports:
      - "8085:8085"
    environment:
      - DATABASE_URL=postgres://inmo_user:inmo_password@inmo-postgres:5432/inmo_catalog_db?sslmode=disable
      - NATS_URL=nats://inmo-nats:4222 
      - DB_HOST=inmo-postgres
      - DB_PORT=5432
      - DB_USER=inmo_user
      - DB_PASSWORD=inmo_password
      - DB_NAME=inmo_catalog_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inmo-network

  finances:
    build:
      context: ../..                  # Sube a la raíz del monorrepo
      dockerfile: contexts/finances/Dockerfile  # Ruta al Dockerfile nuevo
      network: host
    container_name: inmo-finances
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=postgres://inmo_user:inmo_password@inmo-postgres:5432/inmo_catalog_db?sslmode=disable
      - NATS_URL=nats://inmo-nats:4222
    depends_on:
      - postgres 
    networks:
      - inmo-network 

  maintenance:
    build:
      context: ../..
      dockerfile: contexts/maintenance/Dockerfile
      network: host      
    container_name: inmo-maintenance
    ports:
      - "8083:8083"
    environment:
      - DATABASE_URL=postgres://inmo_user:inmo_password@inmo-postgres:5432/inmo_maintenance_db?sslmode=disable
      - NATS_URL=nats://inmo-nats:4222
    depends_on:
      postgres:                       # 🚀 Cambiado de 'inmo-postgres' a 'postgres'
        condition: service_healthy
      nats:                           # 🚀 Cambiado de 'inmo-nats' a 'nats'
        condition: service_healthy
    networks:
      - inmo-network

volumes:
  postgres_data:
    driver: local
  nats_data:
    driver: local

networks:
  inmo-network:
    driver: bridge
    
