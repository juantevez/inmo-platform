services:
  postgres:
    # 🗺️ PostGIS 3.4 sobre Postgres 16 — habilita geografía/geometría para mapas
    image: postgis/postgis:16-3.4-alpine
    container_name: inmo-postgres
    environment:
      POSTGRES_USER: inmo_user
      POSTGRES_PASSWORD: inmo_password
      POSTGRES_DB: inmo_catalog_db # Base por defecto
      # Habilita la extensión PostGIS automáticamente en todas las bases creadas
      POSTGIS_ENABLE_OUTDB_RASTERS: 1
      POSTGIS_GDAL_ENABLED_DRIVERS: ENABLE_ALL
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 🚀 Truco: Creamos la base de auth_db y inmo_maintenance_db automáticamente
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    networks:
      - inmo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inmo_user -d inmo_catalog_db && psql -U inmo_user -d inmo_catalog_db -c 'SELECT PostGIS_Version();' -q --no-align -t"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s

  # --- MESSAGE BROKER: NATS con JetStream ---
  nats:
    image: nats:2.10-alpine
    container_name: inmo-nats
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222" 
      - "8222:8222" 
    volumes:
      - nats_data:/data
    networks:
      - inmo-network
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "4222"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- CACHE & RATE LIMITS: Redis ---
  redis:
    image: redis:7-alpine
    container_name: inmo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - inmo-network

  # --- MIGRATIONS: Corredor Automático para Catálogo ---
  catalog-db-migration:
    image: migrate/migrate
    container_name: inmo-catalog-migration
    volumes:
      - ../../contexts/catalog/migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://inmo_user:inmo_password@postgres:5432/inmo_catalog_db?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inmo-network

  # --- MIGRATIONS: Corredor Automático para Auth ---
  # Espera a que termine Catálogo para secuenciar la carga y asegurar que init-multiple-databases.sh haya creado auth_db
  auth-db-migration:
    image: migrate/migrate
    container_name: inmo-auth-migration
    volumes:
      - ../../contexts/auth-identity/migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://inmo_user:inmo_password@postgres:5432/auth_db?sslmode=disable
      - up
    depends_on:
      catalog-db-migration:
        condition: service_completed_successfully
    networks:
      - inmo-network

  # --- MIGRATIONS: Corredor Automático para Chat ---
  # Se ejecuta secuencialmente después de Auth para evitar saturación de conexiones concurrentes en Postgres
  chat-db-migration:
    image: migrate/migrate
    container_name: docker-chat-db-migration-1
    volumes:
      - ../../contexts/chat/migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://inmo_user:inmo_password@postgres:5432/inmo_catalog_db?sslmode=disable&x-migrations-table=chat_schema_migrations
      - up
    depends_on:
      auth-db-migration:
        condition: service_completed_successfully
    networks:
      - inmo-network

  # --- MIGRATIONS: Corredor Automático para Mantenimiento ---
  # Última migración de la secuencia, asegurando el aislamiento del entorno de BD
  maintenance-db-migration:
    image: migrate/migrate
    container_name: inmo-maintenance-migration
    volumes:
      - ../../contexts/maintenance/migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://inmo_user:inmo_password@postgres:5432/inmo_maintenance_db?sslmode=disable
      - up
    depends_on:
      chat-db-migration:
        condition: service_completed_successfully
    networks:
      - inmo-network

  # --- MIGRATIONS: Corredor Automático para Contratos ---
  # x-migrations-table evita colisión con la tabla schema_migrations de Catálogo
  contracts-db-migration:
    image: migrate/migrate
    container_name: inmo-contracts-migration
    volumes:
      - ../../contexts/contracts/migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://inmo_user:inmo_password@postgres:5432/inmo_catalog_db?sslmode=disable&x-migrations-table=contracts_schema_migrations
      - up
    depends_on:
      maintenance-db-migration:
        condition: service_completed_successfully
    networks:
      - inmo-network

  # ── MICROSERVICIO DE CATÁLOGO ───────────────────────────────────────────
  catalog:
    build:
      context: ../../
      dockerfile: ./contexts/catalog/Dockerfile
      network: host
    container_name: inmo-catalog
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://inmo_user:inmo_password@postgres:5432/inmo_catalog_db?sslmode=disable
      - NATS_URL=nats://nats:4222
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      catalog-db-migration:
        condition: service_completed_successfully
    networks:
      - inmo-network

  # ── MICROSERVICIO DE MANTENIMIENTO ──────────────────────────────────────
  maintenance:
    build:
      context: ../../
      dockerfile: contexts/maintenance/Dockerfile
      network: host
    container_name: inmo-maintenance
    ports:
      - "8083:8083"
    environment:
      - DATABASE_URL=postgres://inmo_user:inmo_password@postgres:5432/inmo_maintenance_db?sslmode=disable
      - NATS_URL=nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      maintenance-db-migration:
        condition: service_completed_successfully
    networks:
      - inmo-network

  # --- MICROSERVICE: Auth & Identity ---
  auth-identity:
    build:
      context: ../../contexts/auth-identity
      dockerfile: Dockerfile
      network: host
    container_name: inmo-auth-identity
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=:8080
      - DATABASE_URL=postgres://inmo_user:inmo_password@postgres:5432/auth_db?sslmode=disable
      - REDIS_URL=redis:6379
      - NATS_URL=nats:4222
      - JWT_SECRET=tu_super_secreto_local
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - META_APP_ID=${META_APP_ID}
      - META_CLIENT_SECRET=${META_CLIENT_SECRET}      
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-db-migration:
        condition: service_completed_successfully
    networks:
      - inmo-network

  crm:
    build:
      context: ../../
      dockerfile: contexts/crm/Dockerfile
      network: host
    container_name: inmo-crm
    ports:
      - "8084:8084"
    environment:
      - DATABASE_URL=postgres://inmo_user:inmo_password@postgres:5432/inmo_catalog_db?sslmode=disable
      - NATS_URL=nats:4222 
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=inmo_user
      - DB_PASSWORD=inmo_password
      - DB_NAME=inmo_catalog_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inmo-network

  contracts:
    build:
      context: ../../
      dockerfile: contexts/contracts/Dockerfile
      network: host
    container_name: inmo-contracts
    ports:
      - "8085:8085"
    environment:
      - DATABASE_URL=postgres://inmo_user:inmo_password@postgres:5432/inmo_catalog_db?sslmode=disable
      - NATS_URL=nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      contracts-db-migration:
        condition: service_completed_successfully
    networks:
      - inmo-network

  chat:
    build:
      context: ../../
      dockerfile: contexts/chat/Dockerfile
      network: host
    container_name: inmo-chat
    ports:
      - "8086:8086"
    environment:
      - DATABASE_URL=postgres://inmo_user:inmo_password@postgres:5432/inmo_catalog_db?sslmode=disable
      - NATS_URL=nats://nats:4222
      - SERVER_PORT=:8086
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      chat-db-migration:
        condition: service_completed_successfully
    networks:
      - inmo-network
 
  finances:
    build:
      context: ../..
      dockerfile: contexts/finances/Dockerfile
      network: host
    container_name: inmo-finances
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=postgres://inmo_user:inmo_password@postgres:5432/inmo_catalog_db?sslmode=disable
      - NATS_URL=nats:4222
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inmo-network 

  # --- API Gateway: punto de acceso a los módulos ---
  inmo-api-gateway:
    container_name: inmo-api-gateway
    build:
      context: ../../
      dockerfile: contexts/api-gateway/Dockerfile
      network: host
    ports:
      - "8000:8000"
    environment:
      - GATEWAY_PORT=:8000
      - CATALOG_SERVICE_URL=http://catalog:8081
      - CRM_SERVICE_URL=http://crm:8084
      - AUTH_SERVICE_URL=http://auth-identity:8080
      - MAINTENANCE_SERVICE_URL=http://maintenance:8083
      - FINANCES_SERVICE_URL=http://finances:8082
      - CONTRACTS_SERVICE_URL=http://contracts:8085
      - CHAT_SERVICE_URL=http://chat:8086 
      - JWT_SECRET=tu_super_secreto_local
    depends_on:
      catalog:
        condition: service_started
      auth-identity:
        condition: service_started
      maintenance:
        condition: service_started
      finances:
        condition: service_started
      contracts:
        condition: service_started
      chat:                       
        condition: service_started        
    networks:
      - inmo-network

volumes:
  postgres_data:
    driver: local
  nats_data:
    driver: local

networks:
  inmo-network:
    driver: bridge
    